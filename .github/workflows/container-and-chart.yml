name: Container and Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CHART_NAME: hubuum-frontend
  CHART_PATH: charts/hubuum-frontend
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  publish-container:
    name: Publish container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: publish-container
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Lint chart
        run: helm lint "${{ env.CHART_PATH }}"

      - name: Package chart
        run: |
          mkdir -p .helm-packages
          helm package "${{ env.CHART_PATH }}" \
            --destination .helm-packages \
            --version "0.0.1-main.${{ github.run_number }}" \
            --app-version "${{ github.sha }}"

      - name: Push chart
        run: helm push ".helm-packages/${{ env.CHART_NAME }}-0.0.1-main.${{ github.run_number }}.tgz" "${{ env.CHART_REGISTRY }}"
