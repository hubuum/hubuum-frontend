services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: hubuum
      POSTGRES_PASSWORD: hubuum_password
      POSTGRES_USER: hubuum
      PGUSER: hubuum
    ports:
      - "127.0.0.1:${HUBUUM_LIVE_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubuum"]
      interval: 2s
      timeout: 2s
      retries: 30

  hubuum:
    image: ${HUBUUM_LIVE_BACKEND_IMAGE:-ghcr.io/hubuum/hubuum-server:main}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hubuum:hubuum_password@postgres:5432/hubuum
      HUBUUM_BIND_IP: 0.0.0.0
      HUBUUM_CLIENT_ALLOWLIST: "*"
      HUBUUM_DATABASE_URL: postgres://hubuum:hubuum_password@postgres:5432/hubuum
      HUBUUM_EVENT_DELIVERY_WORKERS: "0"
      HUBUUM_LOGIN_RATE_LIMIT_ENABLED: "false"
      HUBUUM_LOG_LEVEL: debug
      HUBUUM_TOKEN_HASH_KEY: live-backend-test-token-hash-key
    ports:
      - "127.0.0.1:${HUBUUM_LIVE_BACKEND_PORT:-9999}:8080"
