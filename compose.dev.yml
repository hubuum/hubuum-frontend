name: hubuum-frontend-dev

services:
  valkey:
    image: docker.io/valkey/valkey:9.1.0-alpine3.23@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    command: ["valkey-server", "--appendonly", "no", "--save", ""]
    user: "999:1000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /data:size=32m,uid=999,gid=1000,mode=0700
      - /tmp:size=16m,mode=1777
    ports:
      - "127.0.0.1:${VALKEY_DEV_PORT:-6379}:6379"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
