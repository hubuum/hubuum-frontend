replicaCount: 1

image:
  repository: ghcr.io/hubuum/hubuum-frontend
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hubuum-frontend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

route:
  enabled: false
  host: ""
  annotations: {}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

backend:
  baseUrl: http://hubuum-api:8080

appName: Hubuum Console

session:
  ttlSeconds: 28800
  prefix: "hubuum:sess:"
  settingsPrefix: "hubuum:settings:"

valkey:
  existingSecret:
    name: ""
    urlKey: VALKEY_URL

extraEnv: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  startup:
    path: /healthz
    periodSeconds: 2
    timeoutSeconds: 2
    failureThreshold: 30
  liveness:
    path: /healthz
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
