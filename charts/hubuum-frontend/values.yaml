replicaCount: 2

image:
  repository: ghcr.io/hubuum/hubuum-frontend
  pullPolicy: IfNotPresent
  tag: main

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hubuum-frontend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

route:
  enabled: false
  host: ""
  annotations: {}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

env:
  BACKEND_BASE_URL: http://hubuum-api:8080
  SESSION_TTL_SECONDS: "28800"
  SESSION_PREFIX: "hubuum:sess:"
  NEXT_PUBLIC_APP_NAME: "Hubuum Console"

existingSecret:
  name: ""
  valkeyUrlKey: VALKEY_URL

valkeyUrl: ""

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

probes:
  path: /login
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6
