{{- if and .Values.valkeyUrl (not .Values.existingSecret.name) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hubuum-frontend.fullname" . }}
  labels:
    {{- include "hubuum-frontend.labels" . | nindent 4 }}
type: Opaque
stringData:
  VALKEY_URL: {{ .Values.valkeyUrl | quote }}
{{- end }}
