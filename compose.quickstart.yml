name: hubuum-frontend

services:
  valkey:
    image: docker.io/valkey/valkey:9.1.0-alpine3.23@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    volumes:
      - valkey_data:/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  frontend:
    image: ${HUBUUM_FRONTEND_IMAGE:-ghcr.io/hubuum/hubuum-frontend:v0.0.3}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001,mode=0750
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:?Set BACKEND_BASE_URL in .env.quickstart}
      VALKEY_URL: redis://valkey:6379/0
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      SESSION_PREFIX: ${SESSION_PREFIX:-hubuum:sess:}
      SETTINGS_PREFIX: ${SETTINGS_PREFIX:-hubuum:settings:}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Hubuum Console}
    ports:
      - "127.0.0.1:${HUBUUM_FRONTEND_PORT:-3000}:3000"
    depends_on:
      valkey:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  valkey_data:
